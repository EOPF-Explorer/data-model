version: 2
updates:
  # Enable version updates for Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "developmentseed/data-model-developers"
    assignees:
      - "developmentseed/data-model-developers"
    commit-message:
      prefix: "deps"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "developmentseed/data-model-developers"
    assignees:
      - "developmentseed/data-model-developers"
    commit-message:
      prefix: "ci"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
          - "major"
        patterns:
          - "*"
